<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <clipPath id="cp"><rect width="192" height="192" rx="43" ry="43"/></clipPath>
  </defs>
  <!-- fundo: mesmo hub mas com véu roxo professor -->
  <rect width="192" height="192" rx="43" fill="#04080f"/>
  <rect width="192" height="192" rx="43" fill="#0d0820" opacity="0.95"/>
  <!-- radial vermelho atenuado -->
  <ellipse cx="24" cy="108" rx="66" ry="66" fill="#8b1a1a" opacity="0.14" clip-path="url(#cp)"/>
  <!-- radial ouro dir sup -->
  <ellipse cx="178" cy="32" rx="46" ry="46" fill="#c9a84c" opacity="0.10" clip-path="url(#cp)"/>
  <!-- brilho roxo professor -->
  <ellipse cx="138" cy="58" rx="60" ry="60" fill="#5a3e8a" opacity="0.22" clip-path="url(#cp)"/>
  <!-- radial azul centro inf -->
  <ellipse cx="96" cy="178" rx="72" ry="50" fill="#1a1030" opacity="0.7" clip-path="url(#cp)"/>

  <!-- estrelas (iguais ao aluno) -->
  <circle cx="32"  cy="22"  r="1.1"  fill="white" opacity="0.75"/>
  <circle cx="70"  cy="14"  r="0.85" fill="white" opacity="0.55"/>
  <circle cx="110" cy="10"  r="0.7"  fill="white" opacity="0.45"/>
  <circle cx="136" cy="26"  r="1.3"  fill="white" opacity="0.85"/>
  <circle cx="172" cy="16"  r="0.8"  fill="white" opacity="0.60"/>
  <circle cx="164" cy="52"  r="0.7"  fill="white" opacity="0.42"/>
  <circle cx="22"  cy="60"  r="0.95" fill="white" opacity="0.58"/>
  <circle cx="180" cy="88"  r="0.6"  fill="white" opacity="0.40"/>
  <circle cx="14"  cy="132" r="0.7"  fill="white" opacity="0.38"/>
  <circle cx="168" cy="158" r="0.85" fill="white" opacity="0.42"/>
  <circle cx="52"  cy="172" r="0.6"  fill="white" opacity="0.35"/>
  <circle cx="88"  cy="18"  r="0.6"  fill="white" opacity="0.48"/>

  <!-- losango dourado — idêntico ao aluno -->
  <polygon points="96,16 176,96 96,176 16,96"
    fill="none" stroke="#c9a84c" stroke-width="3.2" opacity="0.95" stroke-linejoin="round"/>
  <polygon points="96,46 134,96 96,146 58,96"
    fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.28"/>

  <line x1="16" y1="96"  x2="176" y2="96"  stroke="#c9a84c" stroke-width="0.7" opacity="0.16"/>
  <line x1="96" y1="16"  x2="96"  y2="176" stroke="#c9a84c" stroke-width="0.7" opacity="0.16"/>

  <!-- ESCHATON — igual ao aluno -->
  <text x="96" y="88"
    font-family="Georgia,'Times New Roman',serif"
    font-weight="900" font-size="19.5"
    fill="#c9a84c" text-anchor="middle" letter-spacing="4">ESCHAT</text>
  <text x="96" y="112"
    font-family="Georgia,'Times New Roman',serif"
    font-weight="900" font-size="19.5"
    fill="#c9a84c" text-anchor="middle" letter-spacing="4">ON</text>

  <!-- divisor roxo (diferença sutil do aluno) -->
  <line x1="42" y1="123" x2="150" y2="123" stroke="#9070d0" stroke-width="0.9" opacity="0.65"/>

  <!-- subtítulo PROFESSOR em vez de EBD · 13 LIÇÕES -->
  <text x="96" y="139"
    font-family="'Arial Narrow',Arial,Helvetica,sans-serif"
    font-weight="700" font-size="9"
    fill="#d0b8f8" text-anchor="middle" letter-spacing="2.5" opacity="0.88">PROFESSOR</text>

  <!-- ponto central roxo -->
  <circle cx="96" cy="96" r="3" fill="#9070d0" opacity="0.65"/>

  <!-- badge PROF canto superior direito -->
  <rect x="122" y="9" width="40" height="15" rx="3.5" fill="#5a3e8a" opacity="0.92"/>
  <text x="142" y="20"
    font-family="'Arial Narrow',Arial,Helvetica,sans-serif"
    font-weight="700" font-size="7.5"
    fill="#e8d5a0" text-anchor="middle" letter-spacing="1.5">PROF</text>
</svg>
